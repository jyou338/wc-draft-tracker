name: Update World Cup Data

on:
  schedule:
    # Runs at 06:00 UTC daily — after overnight matches have finished
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest World Cup data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-wc-data.mjs

      - name: Commit & push if data changed
        run: |
          git config user.name  "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add data/tournament.ts
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: auto-update tournament data $(date -u +%Y-%m-%d)"
            git push
          fi
